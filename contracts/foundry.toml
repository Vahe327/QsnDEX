[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
taiko = "${TAIKO_RPC_URL}"

[profile.taiko]
src = "src"
out = "out-taiko"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "shanghai"

[etherscan]
taiko = { key = "${ETHERSCAN_API_KEY}", url = "https://api.taikoscan.io/api" }
